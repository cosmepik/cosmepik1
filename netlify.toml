# Netlify で Next.js を正しくビルド・実行するための設定
# https://docs.netlify.com/frameworks/next-js/overview/

[build]
  command = "npm run build"
  publish = ".next"

# Next.js 用プラグインを明示指定（publish は base と異なる必要があるため .next を指定）
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# 公開プロフィールページ: CDN で 10 秒キャッシュ、裏で 24 時間 stale 応答可
[[headers]]
  for = "/p/*"
  [headers.values]
    Cache-Control = "public, s-maxage=10, stale-while-revalidate=86400"
